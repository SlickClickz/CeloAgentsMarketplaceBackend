specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: IdentityRegistry
    network: celo
    source:
      address: "0x8004A169FB4a3325136EB29fA0ceB6D2e539a432"
      abi: IdentityRegistry
      startBlock: 58396724
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agent
        - AgentMetadata
        - AgentURIHistory
        - RegistryStats
      abis:
        - name: IdentityRegistry
          file: IdentityRegistry/abis/IdentityRegistry.json
      eventHandlers:
        - event: Registered(indexed uint256,string,indexed address)
          handler: handleRegistered
        - event: MetadataSet(indexed uint256,indexed string,string,bytes)
          handler: handleMetadataSet
        - event: URIUpdated(indexed uint256,string,indexed address)
          handler: handleURIUpdated
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: IdentityRegistry/IdentityRegistry.wasm
